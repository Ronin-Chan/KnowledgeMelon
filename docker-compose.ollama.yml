services:
  ollama:
    image: ollama/ollama:latest
    container_name: knowledge-melon-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama ps >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ollama-pull:
    image: ollama/ollama:latest
    container_name: knowledge-melon-ollama-pull
    depends_on:
      ollama:
        condition: service_started
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-lc"]
    command: "ollama pull ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}"
    restart: "no"

volumes:
  ollama_data:
